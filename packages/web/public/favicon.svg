<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cream background matching the editor palette -->
  <rect width="32" height="32" rx="3" fill="#f7f1e6"/>
  <!-- Left page -->
  <rect x="5" y="7" width="10.5" height="18" rx="0.5"
        fill="#ffffff" stroke="#8a7c66" stroke-width="0.6"/>
  <!-- Right page -->
  <rect x="16.5" y="7" width="10.5" height="18" rx="0.5"
        fill="#ffffff" stroke="#8a7c66" stroke-width="0.6"/>
  <!-- Gutter hairline -->
  <line x1="16" y1="7" x2="16" y2="25" stroke="#d9cdb4" stroke-width="0.4"/>
  <!-- Text indicator on left page (3 short lines) -->
  <line x1="7" y1="11" x2="14" y2="11" stroke="#8a7c66" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="7" y1="13.5" x2="13" y2="13.5" stroke="#8a7c66" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="14" y2="16" stroke="#8a7c66" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Illustration zone on right page (dashed rect) -->
  <rect x="18" y="11" width="7.5" height="10" fill="none"
        stroke="#a37828" stroke-width="0.5" stroke-dasharray="1.2,0.8"/>
</svg>
